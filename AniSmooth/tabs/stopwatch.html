      <div id="stopwatchView" class="tab-content hidden">
        <div class="panel" style="text-align:center;padding:10px;">
          <div class="stopwatch-time-lg" id="stopwatchTime">00:00:00</div>
          <div class="stopwatch-controls" style="margin-top:8px;display:flex;gap:6px;justify-content:center;">
            <button class="btn btn-primary" id="stopwatchToggle" style="width:auto;padding:4px 14px;font-size:9px;">
              <i class="fa-solid fa-play"></i> Start
            </button>
            <button class="btn btn-secondary" id="stopwatchReset" style="width:auto;padding:4px 14px;font-size:9px;">
              <i class="fa-solid fa-rotate-left"></i> Reset
            </button>
          </div>
          <div class="stopwatch-settings" style="margin-top:12px;text-align:left;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="toggle-row" style="padding:0;">
                <span class="toggle-label" style="flex:1;font-size:9px;">Auto-start on project open</span>
                <input type="checkbox" class="toggle-input" id="stopwatchAutostart">
                <span class="toggle-switch"></span>
              </label>
            </div>
          </div>
        </div>
      </div>
