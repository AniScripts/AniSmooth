      <div id="upscaleView" class="tab-content hidden">
        <div class="panel">
          <div class="panel-head">
            <i class="fa-solid fa-maximize panel-head-icon"></i>
            <span class="panel-title">Video Upscaling</span>
          </div>
          <div class="form-group">
            <div id="upscaleLayerInfo"></div>
          </div>
          <div class="form-group">
            <label>Model</label>
            <div class="custom-select" id="upscaleModel">
              <div class="select-trigger">
                <span class="select-value"><i class="fa-solid fa-microchip"></i> Adore Cuda</span>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
              <div class="select-options">
                <div class="select-option active" data-value="adore" data-label="Adore Cuda"><i class="fa-solid fa-microchip"></i> Adore Cuda</div>
                <div class="select-sep"><span>Sharp Detail</span></div>
                <div class="select-option" data-value="fallin_soft" data-label="Fallin Soft Cuda"><i class="fa-solid fa-microchip"></i> Fallin Soft Cuda</div>
              </div>
            </div>
            <div class="info-card" id="upscaleModelInfo"></div>
          </div>
          <div class="form-group">
            <label>Multiplier</label>
            <div class="custom-select" id="upscaleScale">
              <div class="select-trigger">
                <span class="select-value">2x</span>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
              <div class="select-options">
                <div class="select-option active" data-value="2">2x</div>
                <div class="select-option" data-value="4">4x</div>
              </div>
            </div>
            <div class="info-card" id="upscaleScaleInfo"></div>
          </div>
          <div class="btn-row">
            <button id="startUpscaleBtn" class="btn">
              <i class="fa-solid fa-plus"></i> Add to Queue
            </button>
            <button id="previewUpscaleBtn" class="btn" style="flex:0.4;">
              <i class="fa-solid fa-play"></i> Preview
            </button>
          </div>
          <div id="upscalePreviewBar" class="progress-wrap" style="display:none;">
            <div class="progress-track">
              <div id="upscalePreviewFill" class="progress-fill"></div>
            </div>
            <div class="progress-info">
              <span id="upscalePreviewLabel">Preview</span>
              <span id="upscalePreviewPercent">0%</span>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-track">
              <div id="upscaleProgressFill" class="progress-fill"></div>
            </div>
            <div class="progress-info">
              <span id="upscaleProgressLabel">Ready</span>
              <span id="upscaleProgressPercent">0%</span>
            </div>
          </div>
        </div>
      </div>
