<div class="toolkit-subtab" id="tk-sysmon">
  <div class="form-group">
    <span class="form-hint" style="margin-bottom: 12px; display: block;">Real-time CPU, RAM, and GPU diagnostics fetched via Python.</span>
  </div>
  <div id="tk-sysmon-details" class="env-list">
    <div class="env-row"><i class="fa-solid fa-spinner fa-spin"></i> <span>Initializing monitor...</span></div>
  </div>
  <button id="tk-sysmon-refresh" class="btn" style="margin-top: 15px;">
    <i class="fa-solid fa-arrows-rotate"></i> Refresh Metrics
  </button>
</div>
