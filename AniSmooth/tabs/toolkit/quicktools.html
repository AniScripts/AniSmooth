<div class="toolkit-subtab" id="tk-quicktools">
  <div class="tk-qt-section">
    <label>Transform</label>
    <div class="tk-toolbar">
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="0" title="Top-Left"><i class="fa-solid fa-arrow-up-left"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="1" title="Top"><i class="fa-solid fa-arrow-up"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="2" title="Top-Right"><i class="fa-solid fa-arrow-up-right"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="3" title="Left"><i class="fa-solid fa-arrow-left"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="4" title="Center"><i class="fa-solid fa-circle"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="5" title="Right"><i class="fa-solid fa-arrow-right"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="6" title="Bot-Left"><i class="fa-solid fa-arrow-down-left"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="7" title="Bottom"><i class="fa-solid fa-arrow-down"></i></button>
      <button class="tk-icon-btn" data-tk-action="align" data-tk-arg="8" title="Bot-Right"><i class="fa-solid fa-arrow-down-right"></i></button>
    </div>
    <div class="tk-toolbar">
      <button class="tk-icon-btn" data-tk-action="fitToComp" title="Fit to Comp"><i class="fa-solid fa-maximize"></i></button>
      <button class="tk-icon-btn" data-tk-action="centerAnchor" title="Center Anchor"><i class="fa-solid fa-crosshairs"></i></button>
      <button class="tk-icon-btn" data-tk-action="flip" data-tk-arg="x" title="Flip X"><i class="fa-solid fa-arrows-left-right"></i></button>
      <button class="tk-icon-btn" data-tk-action="flip" data-tk-arg="y" title="Flip Y"><i class="fa-solid fa-arrows-up-down"></i></button>
      <button class="tk-icon-btn" data-tk-action="rotate" data-tk-arg="-1" title="Rotate CCW"><i class="fa-solid fa-rotate-left"></i></button>
      <button class="tk-icon-btn" data-tk-action="rotate" data-tk-arg="1" title="Rotate CW"><i class="fa-solid fa-rotate-right"></i></button>
      <select id="tk-rot-angle" style="width:42px;height:24px;font-size:8px;background:var(--inset);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:0 2px;text-align:center;">
        <option value="45">45</option>
        <option value="90" selected>90</option>
        <option value="180">180</option>
      </select>
    </div>
  </div>

  <div class="tk-qt-section">
    <label>Layer Actions</label>
    <div class="tk-toolbar">
      <button class="tk-icon-btn" data-tk-action="precompose" title="Pre-Compose"><i class="fa-solid fa-cubes"></i></button>
      <button class="tk-icon-btn" data-tk-action="createNull" title="Null Object"><i class="fa-solid fa-circle"></i></button>
      <button class="tk-icon-btn" data-tk-action="createAdj" title="Adjustment Layer"><i class="fa-solid fa-circle-half-stroke"></i></button>
      <button class="tk-icon-btn" data-tk-action="createSolid" title="Black Solid"><i class="fa-solid fa-square"></i></button>
      <button class="tk-icon-btn" data-tk-action="createCamera" title="Camera"><i class="fa-solid fa-camera"></i></button>
      <button class="tk-icon-btn" data-tk-action="selectNoPrecomp" title="Select No Pre-Comps"><i class="fa-solid fa-list-check"></i></button>
      <button class="tk-icon-btn" data-tk-action="freezeFrame" title="Freeze Frame"><i class="fa-solid fa-pause"></i></button>
      <button class="tk-icon-btn" data-tk-action="trimOut" title="Trim to CTI"><i class="fa-solid fa-scissors"></i></button>
    </div>
  </div>

  <div class="tk-qt-section">
    <label>Keyframes &amp; Easing</label>
    <div class="tk-toolbar">
      <button class="tk-icon-btn" data-tk-action="easyEase" data-tk-arg="all" title="Easy Ease"><i class="fa-solid fa-wave-square"></i></button>
      <button class="tk-icon-btn" data-tk-action="easyEase" data-tk-arg="in" title="Ease In"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
      <button class="tk-icon-btn" data-tk-action="easyEase" data-tk-arg="out" title="Ease Out"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
      <button class="tk-icon-btn" data-tk-action="easeCurve" data-tk-arg="linear" title="Linear"><i class="fa-solid fa-minus"></i></button>
    </div>
  </div>

  <div class="tk-qt-section tk-qt-last">
    <label>Quick Tools</label>
    <div class="tk-toolbar">
      <button class="tk-icon-btn" data-tk-action="addEffect" data-tk-arg="fill" title="Fill Black"><i class="fa-solid fa-fill-drip"></i></button>
      <button class="tk-icon-btn" data-tk-action="addEffect" data-tk-arg="blur" title="Fast Blur"><i class="fa-solid fa-blender"></i></button>
      <button class="tk-icon-btn" data-tk-action="addEffect" data-tk-arg="sharpen" title="Sharpen"><i class="fa-solid fa-bolt"></i></button>
      <button class="tk-icon-btn" data-tk-action="addEffect" data-tk-arg="lumetri" title="Lumetri"><i class="fa-solid fa-sliders"></i></button>
      <button class="tk-icon-btn" data-tk-action="addEffect" data-tk-arg="curves" title="Curves"><i class="fa-solid fa-chart-simple"></i></button>
      <button class="tk-icon-btn" data-tk-action="addEffect" data-tk-arg="huesat" title="Hue/Sat"><i class="fa-solid fa-palette"></i></button>
      <button class="tk-icon-btn" data-tk-action="saveFrame" title="Save Frame"><i class="fa-solid fa-image"></i></button>
      <button class="tk-icon-btn" data-tk-action="purgeRAM" title="Purge RAM"><i class="fa-solid fa-broom"></i></button>
    </div>
    <div class="tk-toolbar" style="margin-top:4px;">
      <select id="tk-expr-select" style="flex:1;height:24px;font-size:8px;background:var(--inset);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:0 4px;">
        <option value="wiggle">Wiggle (2,50)</option>
        <option value="loopOutCycle">Loop Out - Cycle</option>
        <option value="loopOutPingPong">Loop Out - PingPong</option>
        <option value="elasticBounce">Elastic Bounce</option>
      </select>
      <button class="btn btn-sm" data-tk-action="injectExpr" style="flex:0;white-space:nowrap;"><i class="fa-solid fa-code"></i> Inject</button>
      <button class="btn btn-sm" data-tk-action="moveLayer" data-tk-arg="up" style="flex:0;" title="Move Up"><i class="fa-solid fa-arrow-up"></i></button>
      <button class="btn btn-sm" data-tk-action="moveLayer" data-tk-arg="down" style="flex:0;" title="Move Down"><i class="fa-solid fa-arrow-down"></i></button>
    </div>
    <div class="tk-toolbar" style="margin-top:4px;">
      <input type="number" id="tk-shift-frames" value="5" min="1" style="width:40px;height:24px;font-size:9px;background:var(--inset);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:0 4px;text-align:center;">
      <button class="btn btn-sm" data-tk-action="shiftLayer" data-tk-arg="-1" style="flex:0;white-space:nowrap;"><i class="fa-solid fa-arrow-left"></i> Seq</button>
      <button class="btn btn-sm" data-tk-action="shiftLayer" data-tk-arg="1" style="flex:0;white-space:nowrap;">Seq <i class="fa-solid fa-arrow-right"></i></button>
      <span class="form-hint" style="flex:1;margin:0;text-align:right;">frm offset</span>
    </div>
    <div class="tk-toolbar" style="margin-top:6px;">
      <button class="btn btn-sm" data-tk-action="resetProps" style="flex:0;white-space:nowrap;"><i class="fa-solid fa-undo"></i> Reset</button>
      <button class="btn btn-sm" data-tk-action="createFolders" style="flex:0;white-space:nowrap;"><i class="fa-solid fa-folder-plus"></i> Folders</button>
      <button class="btn btn-sm" data-tk-action="fixPrecompDuration" style="flex:0;white-space:nowrap;"><i class="fa-solid fa-plus"></i> +1 Frame</button>
    </div>
  </div>
</div>
