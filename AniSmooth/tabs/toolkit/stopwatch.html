<div class="toolkit-subtab" id="tk-stopwatch">
  <div style="text-align:center;padding:0;">
    <div class="stopwatch-time-lg" id="tk-stopwatch-time">00:00:00</div>
    <div class="tk-sw-controls" style="margin-top:8px;display:flex;gap:6px;justify-content:center;">
      <button class="btn btn-primary" id="tk-stopwatch-toggle" style="width:auto;padding:4px 14px;font-size:9px;">
        <i class="fa-solid fa-play"></i> Start
      </button>
      <button class="btn btn-secondary" id="tk-stopwatch-reset" style="width:auto;padding:4px 14px;font-size:9px;">
        <i class="fa-solid fa-rotate-left"></i> Reset
      </button>
    </div>
    <div style="margin-top:12px;text-align:left;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="toggle-row" style="padding:0;">
          <span class="toggle-label" style="flex:1;font-size:9px;">Auto-start on project open</span>
          <input type="checkbox" class="toggle-input" id="tk-stopwatch-autostart">
          <span class="toggle-switch"></span>
        </label>
      </div>
    </div>
  </div>
</div>
